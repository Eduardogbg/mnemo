# Mnemo — Local dstack Development Environment
#
# Emulates a Phala CVM locally using the tappd-simulator.
# The simulator provides dummy attestation via the same API
# that the real dstack guest agent serves in production.
#
# Usage:
#   docker compose --env-file ../../.env up -d
#   docker compose logs -f
#   ./test-attestation.sh    # verify attestation works
#   docker compose down
#
# E2E tests (forge pipeline + LLM agent negotiation):
#   docker compose --env-file ../../.env up --build e2e
#
# Forge-only tests (no API key needed):
#   docker compose --env-file ../../.env run --build e2e bun test src/__tests__/hybrid.test.ts

services:
  # ── TEE Simulator ──────────────────────────────────────────
  # Replaces the dstack guest agent (/var/run/dstack.sock).
  # Exposes the same protobuf-RPC API on port 8090.
  # Attestation quotes are synthetic (won't verify against Intel PCCS).
  dstack-simulator:
    image: phalanetwork/tappd-simulator:latest
    platform: linux/amd64
    container_name: mnemo-dstack-simulator
    ports:
      - "8090:8090"
    networks:
      - mnemo-internal
    # No healthcheck — the simulator is a minimal Rust binary with no shell.
    # The harness retries connectivity on startup.

  # ── Mnemo Runtime (placeholder / probe) ────────────────────
  # Simple Node.js container that validates connectivity to the
  # simulator. Kept for quick smoke-testing without building.
  mnemo-runtime:
    image: node:20-alpine
    container_name: mnemo-runtime
    working_dir: /app
    volumes:
      - ./runtime-probe.mjs:/app/runtime-probe.mjs:ro
    environment:
      - DSTACK_SIMULATOR_ENDPOINT=http://dstack-simulator:8090
    command: ["node", "/app/runtime-probe.mjs"]
    depends_on:
      dstack-simulator:
        condition: service_started
    networks:
      - mnemo-internal
    profiles: ["probe"]

  # ── Harness (dual-agent negotiation in simulated TEE) ─────
  # Runs the full DualAgentTest.ts inside a container alongside
  # the dstack simulator, proving the TEE attestation path.
  #
  # Usage:
  #   docker compose --env-file ../../.env up --build harness
  harness:
    build:
      context: ../..
      dockerfile: infra/dstack/Dockerfile.harness
    container_name: mnemo-harness
    environment:
      - VENICE_API_KEY=${VENICE_API_KEY}
      - DSTACK_SIMULATOR_ENDPOINT=http://dstack-simulator:8090
    depends_on:
      dstack-simulator:
        condition: service_started
    networks:
      - mnemo-internal

  # ── E2E Verifier Tests ───────────────────────────────────
  # Runs the full verification E2E: forge pipeline (exploit + patch
  # verification) + LLM-powered prover/verifier negotiation, all
  # inside the simulated TEE environment.
  #
  # Usage:
  #   docker compose --env-file ../../.env up --build e2e
  e2e:
    build:
      context: ../..
      dockerfile: infra/dstack/Dockerfile.e2e
    container_name: mnemo-e2e
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DSTACK_SIMULATOR_ENDPOINT=http://dstack-simulator:8090
    depends_on:
      dstack-simulator:
        condition: service_started
    networks:
      - mnemo-internal

networks:
  mnemo-internal:
    driver: bridge
    # In production (Phala CVM), all containers share the CVM's
    # internal network. This bridge network emulates that isolation.
