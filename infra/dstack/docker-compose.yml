# Mnemo — Local dstack Development Environment
#
# Emulates a Phala CVM locally using the tappd-simulator.
# The simulator provides dummy attestation via the same API
# that the real dstack guest agent serves in production.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   ./test-attestation.sh    # verify attestation works
#   docker compose down

services:
  # ── TEE Simulator ──────────────────────────────────────────
  # Replaces the dstack guest agent (/var/run/dstack.sock).
  # Exposes the same protobuf-RPC API on port 8090.
  # Attestation quotes are synthetic (won't verify against Intel PCCS).
  dstack-simulator:
    image: phalanetwork/tappd-simulator:latest
    container_name: mnemo-dstack-simulator
    ports:
      - "8090:8090"
    networks:
      - mnemo-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/prpc/Tappd.Info || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Mnemo Runtime (placeholder) ────────────────────────────
  # This will become the negotiation harness / state manager.
  # For now it's a simple Node.js container that validates
  # connectivity to the simulator.
  mnemo-runtime:
    image: node:20-alpine
    container_name: mnemo-runtime
    working_dir: /app
    volumes:
      - ./runtime-probe.mjs:/app/runtime-probe.mjs:ro
    environment:
      - DSTACK_SIMULATOR_ENDPOINT=http://dstack-simulator:8090
    command: ["node", "/app/runtime-probe.mjs"]
    depends_on:
      dstack-simulator:
        condition: service_healthy
    networks:
      - mnemo-internal

  # ── Agent A (placeholder) ──────────────────────────────────
  agent-a:
    image: node:20-alpine
    container_name: mnemo-agent-a
    environment:
      - ROLE=agent-a
      - DSTACK_SIMULATOR_ENDPOINT=http://dstack-simulator:8090
      - RUNTIME_URL=http://mnemo-runtime:3000
    command: ["sh", "-c", "echo 'Agent A placeholder — waiting for harness'; sleep infinity"]
    depends_on:
      dstack-simulator:
        condition: service_healthy
    networks:
      - mnemo-internal

  # ── Agent B (placeholder) ──────────────────────────────────
  agent-b:
    image: node:20-alpine
    container_name: mnemo-agent-b
    environment:
      - ROLE=agent-b
      - DSTACK_SIMULATOR_ENDPOINT=http://dstack-simulator:8090
      - RUNTIME_URL=http://mnemo-runtime:3000
    command: ["sh", "-c", "echo 'Agent B placeholder — waiting for harness'; sleep infinity"]
    depends_on:
      dstack-simulator:
        condition: service_healthy
    networks:
      - mnemo-internal

networks:
  mnemo-internal:
    driver: bridge
    # In production (Phala CVM), all containers share the CVM's
    # internal network. This bridge network emulates that isolation.
